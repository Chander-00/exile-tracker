services:
  exile-tracker:
    build: .
    env_file: .env
    volumes:
      - sqlite-data:/app/data
      - ssh-keys:/app/.ssh
    ports:
      - "3000:3000"
      - "2222:2222"
    networks:
      - web
      - default
    restart: unless-stopped

volumes:
  sqlite-data:
  ssh-keys:

networks:
  web:
    external: true
